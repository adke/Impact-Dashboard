services:
  - type: web
    name: impact-dashboard
    runtime: python
    buildCommand: bash build.sh
    startCommand: cd backend && gunicorn "app:create_app()" --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 300
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        sync: false
      - key: PYTHON_VERSION
        value: "3.13"
      - key: NODE_VERSION
        value: "22"
